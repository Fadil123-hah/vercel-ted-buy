<!doctype html>

<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Format Buy Logo Dilzx — Telegram</title>
<style>
:root{
  --bg:#060c1c;
  --card:#0b1328;
  --input:#0f1933;
  --stroke:rgba(255,255,255,.07);
  --text:#e9edff;
  --muted:#8e97c7;
  --danger:#ff4d4d;
}
*{box-sizing:border-box;font-family:Inter,system-ui,Arial,sans-serif}
body{margin:0;min-height:100vh;background:var(--bg);color:var(--text)}
.container{max-width:420px;margin:0 auto;padding:16px}
.title{text-align:center;font-size:24px;font-weight:700;margin:12px 0 18px}
.section{margin-bottom:14px}
.label{display:inline-block;background:#0b132b;padding:6px 12px;border-radius:999px;font-weight:600;margin-bottom:8px}
.input{width:100%;background:var(--input);border:1px solid var(--stroke);border-radius:16px;padding:14px 16px;color:var(--text)}
.input::placeholder{color:#7f88ad}
.error{font-size:12px;color:var(--danger);margin-top:4px;display:none}
.card{background:var(--card);border:1px solid var(--stroke);border-radius:20px;padding:12px}
.btn{width:100%;padding:14px;border-radius:20px;border:1px solid var(--stroke);background:#121d3f;color:#fff;font-size:16px;font-weight:700;margin-bottom:8px}
.footer{text-align:center;color:#6f78a8;margin-top:14px}
.preview-wrap{width:100%;aspect-ratio:1/1;border-radius:20px;overflow:hidden;background:#000}
#styleGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-height:0;overflow:hidden;opacity:0;transition:.5s}
#styleGrid.show{max-height:600px;opacity:1}
.styleItem{background:#fff;border-radius:15px;aspect-ratio:1/1;overflow:hidden;cursor:pointer}
.styleItem img{width:100%;height:100%;object-fit:cover}
#hasil{white-space:pre-line;font-size:13px;color:#cfd6ff}
.styleItem.active{
  outline:1px solid #4da3ff;
}
</style>
</head>
<body>
<div class="container">
  <div class="title">Format Buy Logo Dilzx</div>  <div class="section">
    <div class="label">Welcome</div>
    <div class="preview-wrap">
      <img src="https://files.catbox.moe/w33rsl.jpg" style="width:100%;height:100%;object-fit:cover">
    </div>
  </div>  <div class="section"><div class="label">Nama Atas</div><input id="namaAtas" class="input" placeholder="Masukan Nama Atas"><div class="error" id="e_namaAtas">Wajib diisi</div></div>
  <div class="section"><div class="label">Nama Bawah</div><input id="namaBawah" class="input" placeholder="Masukan Nama Bawah"><div class="error" id="e_namaBawah">Wajib diisi</div></div>
  <div class="section"><div class="label">Username Telegram</div><input id="userTele" class="input" placeholder="@username"><div class="error" id="e_userTele">Wajib diisi</div></div>
  <div class="section"><div class="label">Background</div><input id="bg" class="input" placeholder="Iya / Tidak"><div class="error" id="e_bg">Wajib diisi</div></div>
  <div class="section"><div class="label">Centang Biru</div><input id="centang" class="input" placeholder="Iya / Tidak"><div class="error" id="e_centang">Wajib diisi</div></div>
  <div class="section"><div class="label">Tambahan</div><input id="tambahan" class="input" placeholder="Opsional"></div>  <div class="section"><div class="label">Style</div><div id="styleBtn" class="input">Klik Untuk Memilih Style</div><div class="error" id="e_style">Wajib pilih style</div></div>
  <div class="card">
    <div id="styleGrid">
      <div class="styleItem" data-code="https://files.catbox.moe/vmfa5u.jpg"><img src="https://files.catbox.moe/vmfa5u.jpg"></div>
      <div class="styleItem" data-code="https://files.catbox.moe/7a3a6j.jpg"><img src="https://files.catbox.moe/7a3a6j.jpg"></div>
      <div class="styleItem" data-code="https://files.catbox.moe/ajnufe.jpg"><img src="https://files.catbox.moe/ajnufe.jpg"></div>
      <div class="styleItem" data-code="https://files.catbox.moe/9uoz6a.jpg"><img src="https://files.catbox.moe/9uoz6a.jpg"></div>
      <div class="styleItem" data-code="https://files.catbox.moe/ytkgps.jpg"><img src="https://files.catbox.moe/ytkgps.jpg"></div>
      <div class="styleItem" data-code="https://files.catbox.moe/fbj3m6.jpg"><img src="https://files.catbox.moe/fbj3m6.jpg"></div>
      </div>  </div>    <div class="section"><div class="label">Foto</div><input id="foto" type="file" class="input" accept="image/*"><div class="error" id="e_foto">Wajib upload foto</div></div> 
  <div class="label">Preview Foto</div>
  <div class="preview-wrap">
    <img id="previewFoto"
      src="https://files.catbox.moe/w33rsl.jpg"
      style="width:100%;height:100%;object-fit:cover">
  </div>
</div>
    </div>   
  <div class="section"><div class="label">Hasil</div>  <div class="section"><div class="card" id="hasil">Belum ada data</div></div>  <div class="section"></div>
    <button class="btn" id="kirim">KIRIM KE ADMIN</button>
    <button class="btn" id="limit">BOT LIMIT</button>
    <button class="btn" id="kembali">KEMBALI</button>
  </div>  <div class="footer">@Dilzx Store 2025</div>
</div>
<script>
let selectedStyle='', fotoLink='';
styleBtn.onclick=()=>styleGrid.classList.toggle('show');
document.querySelectorAll('.styleItem').forEach(i=>{
  i.onclick=()=>{
    document.querySelectorAll('.styleItem').forEach(x=>x.classList.remove('active'));
    i.classList.add('active');
    selectedStyle = i.dataset.code;
    e_style.style.display = 'none';
  }
});
let uploading = false;

async function resizeImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 1280;
      let w = img.width;
      let h = img.height;

      if (w > h && w > max) {
        h *= max / w;
        w = max;
      } else if (h > max) {
        w *= max / h;
        h = max;
      }

      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.85);
    };
    img.src = URL.createObjectURL(file);
  });
}

foto.onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;

  // preview langsung
  previewFoto.src = URL.createObjectURL(file);

  uploading = true;
  e_foto.style.display = 'none';

  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', 'dilzxstore'); // <-- ganti
  fd.append('folder', 'dilzx-logo');

  try {
    const r = await fetch(
      'https://api.cloudinary.com/v1_1/ddafteyea/image/upload',
      {
        method: 'POST',
        body: fd
      }
    );

    const j = await r.json();
    if (!j.secure_url) throw new Error();

    fotoLink = j.secure_url; // ✅ URL AMAN HTTPS
  } catch (err) {
    fotoLink = '';
    e_foto.innerText = 'Upload foto gagal';
    e_foto.style.display = 'block';
  }

  uploading = false;
};

function validate(){
  let ok=true;

  [['namaAtas','e_namaAtas'],['namaBawah','e_namaBawah'],['userTele','e_userTele'],['bg','e_bg'],['centang','e_centang']]
  .forEach(([i,e])=>{
    if(!document.getElementById(i).value){
      document.getElementById(e).style.display='block';
      ok=false;
    }
  });

  if(!selectedStyle){
    e_style.style.display='block';
    ok=false;
  }

  if(uploading){
    e_foto.innerText = 'Foto sedang diupload, tunggu...';
    e_foto.style.display = 'block';
    ok = false;
  } else if(!fotoLink){
    e_foto.innerText = 'Wajib upload foto';
    e_foto.style.display = 'block';
    ok = false;
  }

  return ok; // 🔥 INI YANG KURANG
}
function buildText(){
return `FORMAT LOGO DILZX
NAMA ATAS : \`${namaAtas.value}\`
NAMA BAWAH : \`${namaBawah.value}\`
BACKGROUND : \`${bg.value}\`
USER : \`${userTele.value}\`
CENTANG BIRU : \`${centang.value}\`
TAMBAHAN : \`${tambahan.value || '-'}\`
KODE STYLE : \`${selectedStyle}\`
KODE FOTO : \`${fotoLink}\``;
}
function build(){hasil.innerText=buildText()}
kirim.onclick=()=>{if(!validate())return;build();location.href='https://t.me/dilzxxyz?text='+encodeURIComponent(buildText())}
limit.onclick=()=>{if(!validate())return;build();location.href='https://t.me/DilzxJava_bot?text='+encodeURIComponent(buildText())}
kembali.onclick=()=>location.href='https://xmod.top/s/DilzxProduk';
</script></body>
</html>
